name: tests

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  linux_tests:
    runs-on: ubuntu-22.04


    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
        laravel: [10, 11, 12, '13']
        exclude:
          - php: 8.5
            laravel: 11
          - php: 8.5
            laravel: 10
          - php: 8.4
            laravel: 10
          - laravel: '13'
            php: 8.2


    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}


    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false


      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          tools: composer:v2
          coverage: none


      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --with="illuminate/support=^${{ matrix.laravel }}"


      - name: Execute tests
        run: vendor/bin/phpunit --display-deprecations --fail-on-deprecation

  windows_tests:
    runs-on: windows-latest


    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, '12', '13']
        exclude:
          - php: 8.4
            laravel: 10
          - laravel: '13'
            php: 8.2


    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Windows


    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf


      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false


      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, sqlsrv, pdo, pdo_sqlsrv
          ini-values: error_reporting=E_ALL, memory_limit=512M
          tools: composer:v2
          coverage: none


      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --with="illuminate/support=~${{ matrix.laravel }}"


      - name: Execute tests
        run: vendor/bin/phpunit --display-deprecations --fail-on-deprecation
